<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація — ДоДо</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="page">
        <div class="brand">
            <span class="brand-icon">✓</span>
            <span class="brand-name">ДоДо</span>
        </div>
        <div class="auth-card">
            <h1>Створити акаунт</h1>
            <p class="subtitle">Почніть організовувати своє життя</p>

            <form th:action="@{/register}" method="post">
                <div class="field">
                    <label>Логін</label>
                    <input type="text" name="login" placeholder="Оберіть логін" autocomplete="username" required/>
                </div>
                <div class="field">
                    <label>Пароль</label>
                    <input type="password" name="password" placeholder="Створіть пароль" autocomplete="new-password" required/>
                </div>
                <button type="submit" class="btn-primary">Зареєструватись</button>
            </form>

            <div class="switch">
                Вже є акаунт? <a th:href="@{/login}">Увійти</a>
            </div>
        </div>
    </div>
</body>
</html>
