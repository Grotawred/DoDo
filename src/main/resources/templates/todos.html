<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання — ДоДо</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/todos.css}">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">✓</span>
                <span class="logo-text">ДоДо</span>
            </div>
            <form th:action="@{/logout}" method="post" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="logout-btn" title="Вийти">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </form>
        </div>

        <div class="nav-section">
            <p class="nav-label">Категорії</p>
            <a th:href="@{/}" th:classappend="${activeCategory == null} ? 'nav-link active' : 'nav-link'">
                <span class="nav-icon">🗂</span> Усі списки
            </a>
            <a th:each="cat : ${categories}"
               th:href="@{/(category=${cat})}"
               th:classappend="${activeCategory == cat} ? 'nav-link active' : 'nav-link'">
                <span class="nav-icon"
                      th:text="${cat.name() == 'РОБОТА'} ? '💼' : (${cat.name() == 'НАВЧАННЯ'} ? '📚' : (${cat.name() == 'ПЕРСОНАЛЬНЕ'} ? '🌱' : '🛒'))">
                </span>
                <span th:text="${cat}"></span>
            </a>
        </div>

        <div class="nav-section" th:if="${!#lists.isEmpty(lists)}">
            <p class="nav-label">Мої списки</p>
            <div th:each="list : ${lists}" class="list-nav-item">
                <a th:href="@{/(category=${activeCategory}, listId=${list.id})}"
                   th:text="${list.title}"
                   th:classappend="${activeList != null and list.id == activeList.id} ? 'nav-link active' : 'nav-link'">
                </a>
                <form th:action="@{/lists/{id}/delete(id=${list.id})}" method="post" class="inline-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="delete-list-btn" title="Видалити список"
                            onclick="return confirm('Видалити список разом із завданнями?')">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                    </button>
                </form>
            </div>
        </div>

        <div class="create-form-wrapper">
            <p class="nav-label">Новий список</p>
            <form class="new-list-form" action="/lists" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input name="title" placeholder="Назва списку…" required class="form-input">
                <select name="category" required class="form-select">
                    <option value="" disabled selected>Категорія</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat}">
                    </option>
                </select>
                <button type="submit" class="btn-create">+ Створити список</button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="content">

        <div class="empty-state" th:if="${activeList == null}">
            <div class="empty-icon">📋</div>
            <h2>Оберіть список</h2>
            <p>Виберіть список зі списків зліва або створіть новий</p>
        </div>

        <div th:if="${activeList != null}" class="task-view">

            <div class="content-header">
                <div>
                    <h1 th:text="${activeList.title}"></h1>
                    <span class="task-count"
                          th:text="${#sets.size(activeList.tasks)} + ' ' + (${#sets.size(activeList.tasks) == 1} ? 'завдання' : 'завдань')">
                    </span>
                </div>
            </div>

            <div class="tasks-container">
                <div th:if="${#sets.isEmpty(activeList.tasks)}" class="tasks-empty">
                    <p>Жодного завдання. Додайте перше! 👇</p>
                </div>


                <ul class="task-list" th:if="${!#sets.isEmpty(activeList.tasks)}">
                    <li th:each="task : ${activeList.tasks}"
                        class="task-item"
                        th:classappend="${task.completed} ? 'task-done' : ''">

                        <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post" class="toggle-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="listId" th:value="${activeList.id}" />

                            <button type="submit" class="task-check-btn">
                                <svg th:if="${!task.completed}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <circle cx="12" cy="12" r="10"/>
                                </svg>
                                <svg th:if="${task.completed}" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2.5">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                </svg>
                            </button>
                        </form>

                        <span class="task-title" th:text="${task.title}"></span>

                        <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" class="inline-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="listId" th:value="${activeList.id}" />
                            <button type="submit" class="delete-task-btn" title="Видалити завдання">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                                </svg>
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
            <form class="add-task-form" action="/tasks" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="listId" th:value="${activeList.id}" />
                <input name="title" placeholder="Нове завдання…" required class="task-input">
                <button type="submit" class="btn-add">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Додати
                </button>
            </form>

        </div>
    </main>

</div>

</body>
</html>
