<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — ДоДо</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="page">
        <div class="brand">
            <span class="brand-icon">✓</span>
            <span class="brand-name">ДоДо</span>
        </div>
        <div class="auth-card">
            <h1>Вхід до акаунту</h1>
            <p class="subtitle">Раді бачити вас знову</p>

            <div th:if="${param.error}" class="alert alert-error">
                Невірний логін або пароль
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                Ви успішно вийшли
            </div>

            <form th:action="@{/login}" method="post">
                <div class="field">
                    <label>Логін</label>
                    <input type="text" name="username" placeholder="Введіть логін" autocomplete="username" required/>
                </div>
                <div class="field">
                    <label>Пароль</label>
                    <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
                </div>
                <button type="submit" class="btn-primary">Увійти</button>
            </form>

            <div class="switch">
                Немає акаунту? <a th:href="@{/register}">Зареєструватись</a>
            </div>
        </div>
    </div>
</body>
</html>
